<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bí Kíp Ký Túc Xá - Di Sản Cấp 3</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">KÝ TÚC XÁ <span>VIP</span></div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="chuyenTrang('trang-chu', this)">TRANG CHỦ</button>
            <button class="nav-btn" onclick="chuyenTrang('ho-so', this)">HỒ SƠ THÀNH VIÊN</button>
            <button class="nav-btn" onclick="chuyenTrang('luat-ngam', this)">LUẬT NGẦM</button>
        </div>
    </nav>

    <div id="trang-chu" class="page-section active">
        <h1>🏆 Bảng Phong Thần Ký Túc Xá 🏆</h1>
        <div class="tier-list" id="tier-container">
            <div class="tier-row">
                <div class="tier-label tier-s">S</div>
                <div class="tier-content" id="content-S"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-a">A</div>
                <div class="tier-content" id="content-A"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-b">B</div>
                <div class="tier-content" id="content-B"></div>
            </div>
            <div class="tier-row">
                <div class="tier-label tier-c">C</div>
                <div class="tier-content" id="content-C"></div>
            </div>
        </div>
    </div>

    <div id="ho-so" class="page-section">
        <h1>👨‍🎓 Cư Dân Ký Túc Xá 👨‍🎓</h1>
        <p style="text-align: center; color: #8892B0;">Tính năng Hồ sơ thành viên đang được xây dựng...</p>
    </div>

    <div id="luat-ngam" class="page-section">
        <h1>📜 Luật Ngầm Ký Túc Xá 📜</h1>
        <p style="text-align: center; color: #8892B0;">Tính năng Luật ngầm đang được xây dựng...</p>
    </div>

    <script>
        // 1. CHỨC NĂNG CHUYỂN TRANG
        function chuyenTrang(idTrang, nutDuocBam) {
            let cacTrang = document.getElementsByClassName('page-section');
            for (let i = 0; i < cacTrang.length; i++) {
                cacTrang[i].classList.remove('active');
            }
            let cacNut = document.getElementsByClassName('nav-btn');
            for (let i = 0; i < cacNut.length; i++) {
                cacNut[i].classList.remove('active');
            }
            document.getElementById(idTrang).classList.add('active');
            nutDuocBam.classList.add('active');
        }

        // 2. CHỨC NĂNG HÚT DỮ LIỆU GOOGLE SHEETS
        // Ép trình duyệt luôn lấy dữ liệu mới nhất bằng cách gắn thêm thời gian thực vào đuôi link
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQaVySxC6YjIMtHy56I89OF9fFLuO9py6JuS1i-_T7i8Wh8M7K3w-rOVvwSrr3yaHeYB9LkyK7N8unK/pub?output=tsv' + '&t=' + new Date().getTime();

        fetch(sheetUrl)
            .then(response => response.text())
            .then(data => {
                // Xử lý triệt để các dấu xuống dòng ẩn
                const rows = data.split(/\r?\n/); 
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    
                    const cols = rows[i].split('\t');
                    
                    // Dọn dẹp dấu cách thừa ở đầu/cuối chữ
                    const ten = cols[0] ? cols[0].trim() : '';
                    let tier = cols[1] ? cols[1].toUpperCase().replace('TIER', '').trim() : ''; 
                    const phanLoai = cols[2] ? cols[2].trim() : '';
                    const moTa = cols[3] ? cols[3].trim() : '';
                    
                    if(ten && tier) {
                        const cardHTML = `
                            <div class="item-card">
                                <div class="item-title">${ten}</div>
                                <div class="item-tag">${phanLoai}</div>
                                <div class="item-desc">${moTa}</div>
                            </div>
                        `;
                        // Tìm đúng hộp Tier để đưa vào (ví dụ: content-S)
                        const targetBox = document.getElementById('content-' + tier);
                        if(targetBox) {
                            targetBox.innerHTML += cardHTML;
                        }
                    }
                }
            })
            .catch(error => console.error('Lỗi lấy dữ liệu:', error));
    </script>
</body>
</html>
